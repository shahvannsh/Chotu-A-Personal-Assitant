<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chotu — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#080c10;--surface:#0d1117;--accent:#00c8ff;--text:#c9d1d9;--text-hi:#e6edf3;--text-dim:#4a5568;--border:#1a2332;--mono:'Share Tech Mono',monospace;--sans:'Rajdhani',sans-serif;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.01) 2px,rgba(0,200,255,0.01) 4px);pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(0,200,255,0.06) 0%,transparent 60%);pointer-events:none;}

.card{position:relative;z-index:1;background:var(--surface);border:1px solid #243447;border-radius:12px;padding:48px 40px;width:380px;max-width:95vw;text-align:center;box-shadow:0 0 60px rgba(0,200,255,0.08);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);border-radius:12px 12px 0 0;}

.logo{font-family:var(--mono);font-size:32px;color:var(--accent);letter-spacing:6px;text-shadow:0 0 30px rgba(0,200,255,0.4);margin-bottom:6px;}
.tagline{font-family:var(--mono);font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:40px;}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:2px;}

.google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:white;border:none;border-radius:6px;cursor:pointer;text-decoration:none;font-family:var(--sans);font-size:15px;font-weight:600;color:#1a1a1a;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
.google-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.google-btn svg{width:20px;height:20px;flex-shrink:0;}

.features{margin-top:36px;display:flex;flex-direction:column;gap:8px;}
.feature{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:1px;text-align:left;}
.feature-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}

.error-msg{font-family:var(--mono);font-size:11px;color:#ff6b35;margin-top:16px;display:none;}
.error-msg.visible{display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">CHOTU</div>
  <div class="tagline">PERSONAL AI PRODUCTIVITY ASSISTANT</div>

  <div class="divider"><span>SIGN IN TO CONTINUE</span></div>

  <a href="/auth/login" class="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <div class="features">
    <div class="feature"><div class="feature-dot"></div>Focus sessions with idle detection</div>
    <div class="feature"><div class="feature-dot"></div>AI chat with web search</div>
    <div class="feature"><div class="feature-dot"></div>Study mode with quiz generation</div>
    <div class="feature"><div class="feature-dot"></div>Session history and streaks</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
if (params.get('error')) {
  const el = document.getElementById('errorMsg');
  el.textContent = 'Sign in failed. Please try again.';
  el.classList.add('visible');
}
</script>
</body>
</html>
